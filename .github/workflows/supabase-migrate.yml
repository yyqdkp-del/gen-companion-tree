name: Supabase Migrations (prod)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: qohooiampagjsihdndvg
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Apply pending migrations (linked)
        run: supabase migration up --linked

      - name: Show remote migration status (linked)
        run: supabase migration list --linked --password "$SUPABASE_DB_PASSWORD"
